    <script
      src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/css.min.js"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.prod.js"
    ></script>
    <script type="module">
      import { css as codeMirrorCss } from '@codemirror/lang-css';
      import {
        basicSetup,
        EditorView
      } from 'codemirror';

      import { minifyCSS } from './index.js';

      Vue.createApp({
        name: 'CSSLOPLAYGROUND',
        data: function () {
          return {
            input: 'body {\n  color: #FF0000;\n}',
            duration: 0,
            theme: 'dark',
            realSelected: '',
            realFilesMap: [],
            mirror: undefined
          };
        },
        methods: {
          initializeCodeMirror: function () {
            this.mirror = new EditorView({
              doc: this.input,
              extensions: [
                basicSetup,
                codeMirrorCss(),
                EditorView.updateListener.of((update) => {
                  if (update.docChanged) {
                    this.input = this.mirror.state.doc.toString();
                  }
                })
              ]
            });
            const parent = document.getElementById('codemirror');
            parent.insertBefore(this.mirror.dom, parent.firstChild);
          },
          loadRealFileNames: function () {
            fetch('/csslop/real.json')
              .then((response) => {
                return response.json();
              })
              .then((libraries) => {
                this.realFilesMap = libraries.filter((library) => {
                  return library.size < 500_000;
                });
              })
          },
          loadRealSelection: function () {
            fetch('/csslop/real/' + this.realSelected)
              .then((response) => {
                return response.text();
              })
              .then((contents) => {
                this.input = contents.trim();
                this.mirror.dispatch({
                  changes: {
                    from: 0,
                    to: this.mirror.state.doc.length,
                    insert: this.input
                  }
                });
              });
          },
          loadTheme: function () {
            let theme = localStorage.getItem('csslop-theme');
            if (theme && ['light', 'dark'].includes(theme)) {
              this.setTheme(theme);
            } else if (!window.matchMedia('(prefers-color-scheme: dark)')) {
              this.setTheme('light');
            } else {
              this.setTheme('dark');
            }
          },
          setTheme: function (theme) {
            this.theme = theme;
            localStorage.setItem('csslop-theme', theme);
            const linkTheme = document.getElementById('theme');
            const codeTheme = document.getElementById('code-theme');
            const themeUrl = linkTheme.getAttribute('href');
            const codeUrl = codeTheme.getAttribute('href');
            if (theme === 'light') {
              linkTheme.setAttribute('href', themeUrl.replace('dark', 'light'));
              codeTheme.setAttribute('href', codeUrl.replace('sunburst', 'atom-one-light'));
            } else {
              linkTheme.setAttribute('href', themeUrl.replace('light', 'dark'));
              codeTheme.setAttribute('href', codeUrl.replace('atom-one-light', 'sunburst'));
            }
          },
          toggleTheme: function () {
            if (this.theme === 'dark') {
              this.setTheme('light');
            } else {
              this.setTheme('dark');
            }
          },
          minfiy: function () {
            const start = Date.now();
            const css = minifyCSS(this.input);
            this.duration = Date.now () - start;
            return css;
          },
          lzwEncode: function (input) {
            let dictionary = {};
            let data = (input + '').trim().split('');
            let out = [];
            let currentCharacter;
            let phrase = data[0];
            let code = 256;
            for (let i = 1; i < data.length; i++) {
              currentCharacter = data[i];
              if (dictionary[phrase + currentCharacter] != null) {
                phrase += currentCharacter;
              } else {
                if (phrase.length > 1) {
                  out.push(dictionary[phrase]);
                } else {
                  out.push(phrase.charCodeAt(0));
                }
                dictionary[phrase + currentCharacter] = code;
                code++;
                phrase = currentCharacter;
              }
            }
            if (phrase.length > 1) {
              out.push(dictionary[phrase]);
            } else {
              out.push(phrase.charCodeAt(0));
            }
            for (let i = 0; i < out.length; i++) {
              out[i] = String.fromCharCode(out[i]);
            }
            return out.join('');
          },
          lzwDecode: function (input) {
            let dictionary = {};
            let data = (input + '').split('');
            let currentCharacter = data[0];
            let oldPhrase = currentCharacter;
            let out = [currentCharacter];
            let code = 256;
            let phrase;
            for (let i = 1; i < data.length; i++) {
              let currCode = data[i].charCodeAt(0);
              if (currCode < 256) {
                phrase = data[i];
              } else {
                phrase = (
                  dictionary[currCode] ||
                  oldPhrase + currentCharacter
                );
              }
              out.push(phrase);
              currentCharacter = phrase.charAt(0);
              dictionary[code] = oldPhrase + currentCharacter;
              code++;
              oldPhrase = phrase;
            }
            return out.join('');
          },
          setUrlParams: function () {
            let value = '';
            if (this.input) {
              value = this.lzwEncode(this.input);
            }
            const url = new URL(window.location);
            url.searchParams.set('v', value);
            history.replaceState({}, '', url);
          },
          loadUrlParams: function () {
            const url = new URL(window.location);
            const value = url.searchParams.get('v')
            if (value) {
              this.input = this.lzwDecode(value);
            }
          }
        },
        computed: {
          codeMirrorExtensions: function () {
            return [codeMirrorCss()];
          },
          output: function () {
            const css = this.minfiy();
            const options = { language: 'css' };
            return window.hljs.highlight(css, options).value;
          }
        },
        watch: {
          input: function () {
            this.setUrlParams();
          }
        },
        created: function () {
          this.loadTheme();
          this.loadUrlParams();
          this.loadRealFileNames();
        },
        mounted: function () {
          this.initializeCodeMirror();
        }
      }).mount('#app');
    </script>
